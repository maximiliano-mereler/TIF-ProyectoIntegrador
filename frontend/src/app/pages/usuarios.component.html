<div class="modulo-container">
    <h2>Administraci&oacute;n de Usuarios</h2>

  <div *ngIf="errorMensaje" class="alert error-alert">{{ errorMensaje }}</div>
  <div *ngIf="exitoMensaje" class="alert success-alert">{{ exitoMensaje }}</div>

    <div class="card-formulario">
    <h3>Alta de Nuevo Usuario</h3>
    <form (ngSubmit)="crearUsuario()" class="form-inline">
        <div class="form-group">
        <input 
            type="text" 
            name="nuevoNombre" 
            [(ngModel)]="nuevoNombre" 
            placeholder="Nombre de usuario" 
            autocomplete="off"
        />
        </div>
        <div class="form-group">
        <input 
            type="password" 
            name="nuevaClave" 
            [(ngModel)]="nuevaClave" 
            placeholder="Contrase&ntilde;a" 
        />
        </div>
        <button type="submit" class="btn-primary">Registrar</button>
    </form>
    </div>

    <div class="card-tabla">
    <h3>Usuarios Registrados</h3>
    <table class="data-table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Estado Actual</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let u of usuarios">
            <td>{{ u.id }}</td>
            <td>{{ u.nombre }}</td>
            <td>
            <span class="badge" [ngClass]="u.estado === 'ACTIVO' ? 'badge-activo' : 'badge-baja'">
                {{ u.estado }}
            </span>
            </td>
            <td>
            <button 
                (click)="alternarEstado(u)" 
                class="btn-action" 
                [ngClass]="u.estado === 'ACTIVO' ? 'btn-danger' : 'btn-success'"
            >
                {{ u.estado === 'ACTIVO' ? 'Dar de Baja' : 'Activar' }}
            </button>
            </td>
        </tr>
        </tbody>
    </table>
    </div>
</div>
